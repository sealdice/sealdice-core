name: Test & Lint

on:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - 'test-and-lint.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - '**.go'
      - 'go.mod'
      - 'test-and-lint.yml'

jobs:
  test-and-lint:
    name: Test & Lint
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go get
      - run: go generate ./...

      - run: go test -v -race ./...
      - run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v8
        if: github.event_name != 'pull_request'
        with:
          version: latest
          args: '--timeout 9999s'
