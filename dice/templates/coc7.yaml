  defaultsComputed: # 计算默认值
    $STR_SIZ_SUM: 力量 + 体型
    DB: $STR_SIZ_SUM < 65 ? -2, $STR_SIZ_SUM < 85 ? -1, $STR_SIZ_SUM < 125 ? 0, $STR_SIZ_SUM < 165 ? 1d4, $STR_SIZ_SUM < 205 ? 1d6, 1 ? (($STR_SIZ_SUM - 205) / 80 + 2)d6
    体格: $STR_SIZ_SUM < 65 ? -2, $STR_SIZ_SUM < 85 ? -1, $STR_SIZ_SUM < 125 ? 0, $STR_SIZ_SUM < 165 ? 1, $STR_SIZ_SUM < 205 ? 2, 1 ? (($STR_SIZ_SUM - 205) / 80 + 3)
    移动力: 敏捷 > 体型 && 力量 > 体型 ? 9, 敏捷 < 体型 && 力量 < 体型 ? 7, 1 ? 8
    生命值上限: (体质 + 体型) / 10
    魔法值上限: 意志 / 5
    理智上限: 99 - 克苏鲁神话
    母语: 教育
    闪避: 敏捷 / 2

    dbText: $STR_SIZ_SUM < 65 ? -2, $STR_SIZ_SUM < 85 ? -1, $STR_SIZ_SUM < 125 ? 0, $STR_SIZ_SUM < 165 ? "1d4", $STR_SIZ_SUM < 205 ? "1d6", 1 ? toStr(($STR_SIZ_SUM - 205) / 80 + 2) + "d6"


