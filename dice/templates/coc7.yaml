commands:
  set:
    diceSides: '100'
    keys:
      - coc
      - coc7
    relatedExt:
      - coc7

  sn:
    coc:
      template: '{$t玩家_RAW} SAN{理智} HP{生命值}/{生命值上限} DEX{敏捷}'
      helpText: 自动设置coc名片
    cocL:
      template: '{$t玩家_RAW} san{理智} hp{生命值}/{生命值上限} dex{敏捷}'
      helpText: 自动设置coc名片，小写

  st:
    show: # show时显示的值
      top: [力量, 敏捷, 体质, 体型, 外貌, 智力, 意志, 教育, 幸运, DB, 体格, 移动力, 理智, 生命值, 魔法值, 护甲]
      sortBy: name
      itemsPerLine: 4
      ignores:
        - 生命值上限
        - 魔法值上限
        - 理智上限
      showValueAs:
        生命值: '{生命值}/{生命值上限}'
        魔法值: '{魔法值}/{魔法值上限}'
        理智: '{理智}/{理智上限}'
      showValueAsIfMiss:
        DB: '{dbText}'
        体格: '{体格}'
        移动力: '{移动力}'
      showKeyAs:
        生命值: '生命'
        魔法值: '魔法'


textMap: # 特殊扩展
  COC:
    设置测试_成功:
      - [设置完成, 1]
