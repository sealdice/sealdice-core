# https://taskfile.dev

version: '3'

tasks:
  install:
    cmds:
      - go mod download
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install github.com/pointlander/peg@v1.0.1
      - go generate ./...

  run:
    deps: ['test-and-lint']
    cmds:
      - go run .
  build:
    deps: ['test-and-lint']
    cmds:
      - task: build-only
  build-with-v2ui:
    deps: ['test-and-lint']
    cmds:
      - mkdir -p temp
      - go build -o temp/openapi-gen .
      - ./temp/openapi-gen --gen-openapi=./ui/openapi.json
      - pnpm --dir ui run generate-client
      - pnpm --dir ui run build:embed:prepared
      - task: build-only
  
  test-and-lint:
    deps: ['test', 'lint']
  test:
    cmds:
      - go test ./...
      - go vet ./...
  lint:
    cmds:
      - goimports -w .
      - golangci-lint run

  build-only:
    cmds:
      - go build .
